<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="are_you_robot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>你是人类还是机器人？</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --loader-bg-top: #f4e7d8;
      --loader-bg-bottom: #fbf5ed;
      --loader-accent: #d96e39;
      --loader-accent-soft: rgba(217, 110, 57, 0.12);
      --loader-ink: #2b1e18;
      --loader-muted: #6f5d55;
      --loader-panel: rgba(255, 252, 248, 0.88);
      --loader-border: rgba(217, 110, 57, 0.12);
      --loader-shadow: rgba(64, 35, 20, 0.12);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(135deg, var(--loader-bg-top), var(--loader-bg-bottom));
    }

    body {
      font-family: "Noto Serif SC", "Source Serif 4", Georgia, serif;
    }

    #bootstrap-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, var(--loader-bg-top), var(--loader-bg-bottom));
      overflow: hidden;
      transition: opacity 240ms ease, visibility 240ms ease;
      z-index: 9999;
    }

    #bootstrap-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(4px);
      pointer-events: none;
    }

    .loader-orb.one {
      width: 240px;
      height: 240px;
      top: -68px;
      left: -48px;
      background: radial-gradient(circle, rgba(217, 110, 57, 0.2), rgba(217, 110, 57, 0));
      animation: orbFloatOne 5.4s ease-in-out infinite;
    }

    .loader-orb.two {
      width: 320px;
      height: 320px;
      right: -96px;
      bottom: -110px;
      background: radial-gradient(circle, rgba(118, 89, 42, 0.18), rgba(118, 89, 42, 0));
      animation: orbFloatTwo 6.2s ease-in-out infinite;
    }

    .loader-card {
      position: relative;
      width: min(100%, 460px);
      border-radius: 32px;
      border: 1px solid var(--loader-border);
      background: var(--loader-panel);
      box-shadow: 0 18px 44px var(--loader-shadow);
      backdrop-filter: blur(10px);
      padding: 30px 28px 28px;
      text-align: center;
    }

    .loader-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--loader-accent-soft);
      color: var(--loader-accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 14px;
    }

    .loader-stage {
      position: relative;
      width: 138px;
      height: 138px;
      margin: 22px auto 18px;
      display: grid;
      place-items: center;
    }

    .loader-ring,
    .loader-ring::after,
    .loader-ring::before {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      content: "";
    }

    .loader-ring {
      background: radial-gradient(circle, rgba(217, 110, 57, 0.16), rgba(217, 110, 57, 0.03) 58%, rgba(217, 110, 57, 0) 70%);
      animation: pulseRing 1.9s ease-in-out infinite;
    }

    .loader-ring::before {
      inset: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(217, 110, 57, 0.14);
    }

    .loader-ring::after {
      inset: 34px;
      border: 4px solid rgba(217, 110, 57, 0.18);
      border-top-color: var(--loader-accent);
      animation: spinRing 1.2s linear infinite;
    }

    .loader-robot {
      position: relative;
      font-size: 56px;
      line-height: 1;
      animation: robotBob 1.8s ease-in-out infinite;
      z-index: 1;
    }

    .loader-title {
      margin: 0;
      color: var(--loader-ink);
      font-size: clamp(30px, 6vw, 38px);
      line-height: 1.08;
      font-weight: 700;
    }

    .loader-copy {
      margin: 10px 0 0;
      color: var(--loader-muted);
      font-size: 17px;
      line-height: 1.72;
    }

    .loader-progress {
      width: min(100%, 220px);
      height: 10px;
      margin: 24px auto 0;
      border-radius: 999px;
      background: rgba(217, 110, 57, 0.12);
      overflow: hidden;
    }

    .loader-progress-bar {
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #d96e39, #f0a067);
      animation: indeterminateBar 1.2s ease-in-out infinite;
      transform-origin: left center;
    }

    .loader-foot {
      margin-top: 14px;
      color: var(--loader-accent);
      font-size: 15px;
      font-weight: 700;
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    @keyframes pulseRing {
      0%, 100% { transform: scale(0.96); opacity: 0.72; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes robotBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes indeterminateBar {
      0% { transform: translateX(-130%) scaleX(0.72); }
      55% { transform: translateX(74%) scaleX(1); }
      100% { transform: translateX(240%) scaleX(0.82); }
    }

    @keyframes orbFloatOne {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(28px, 18px, 0); }
    }

    @keyframes orbFloatTwo {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(-24px, -20px, 0); }
    }
  </style>
</head>
<body>
  <div id="bootstrap-loader" aria-live="polite" aria-busy="true">
    <div class="loader-orb one"></div>
    <div class="loader-orb two"></div>
    <div class="loader-card">
      <div class="loader-badge">正在启动</div>
      <div class="loader-stage" aria-hidden="true">
        <div class="loader-ring"></div>
        <div class="loader-robot">🤖</div>
      </div>
      <h1 class="loader-title">题库加载中</h1>
      <p class="loader-copy">先别急，马上就好。</p>
      <div class="loader-progress" aria-hidden="true">
        <div class="loader-progress-bar"></div>
      </div>
      <div class="loader-foot">正在准备题目</div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('bootstrap-loader');
      if (!loader) {
        return;
      }
      loader.classList.add('hidden');
      window.setTimeout(function () {
        loader.remove();
      }, 260);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
