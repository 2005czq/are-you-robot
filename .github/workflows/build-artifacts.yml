name: Build and Release Desktop and Android Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows app
        run: flutter build windows --release

      - name: Archive Windows app
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release -DestinationPath build/windows/x64/runner/are-you-robot-windows-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: are-you-robot-windows-release
          path: build/windows/x64/runner/are-you-robot-windows-release.zip
          if-no-files-found: error

  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare APK asset
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/are-you-robot-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: are-you-robot-android-apk
          path: build/app/outputs/flutter-apk/are-you-robot-android.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - windows
      - android
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Prepare release metadata
        id: meta
        run: |
          echo "tag=build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "name=Build ${GITHUB_RUN_NUMBER} (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: are-you-robot-windows-release
          path: dist/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: are-you-robot-android-apk
          path: dist/android

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            dist/windows/are-you-robot-windows-release.zip
            dist/android/are-you-robot-android.apk
