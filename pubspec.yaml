name: are_you_robot
description: A child-friendly Turing Test demo built with Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.1
  path_provider: ^2.1.5
  sembast: ^3.8.5+1
  sembast_web: ^2.4.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/bootstrap/challenges.json
    - assets/bootstrap/generated_text_challenges.json
    - assets/bootstrap/seed_manifest.json
    - assets/images/placeholders/
  fonts:
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSerifSC-Bold.ttf
          weight: 700
    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/SourceSerif4-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceSerif4-Bold.ttf
          weight: 700
